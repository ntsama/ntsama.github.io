<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>

  <body>

    <!-- HEADER -->
    <section class="page-header">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>

      <!-- MENU -->
      <nav>
        {% for item in site.nav %}
          <a href="{{ item.url }}">{{ item.title }}</a>
        {% endfor %}
      </nav>
    </section>

    <!-- MAIN CONTENT -->
    <section class="main-content">
      {{ content }}
    </section>

    <!-- FOOTER -->
    <footer style="text-align:center; margin-top:40px; font-size:0.9rem; opacity:0.8;">

      <p>
        <a href="/home/">Home</a> •
        <a href="/about_en/">About</a> •
        <a href="/theory_en/">Theory</a> •
        <a href="/research_en/">Research</a> •
        <a href="/msca_en/">MSCA Project</a> •
        <a href="/ia4zep_en/">IA_4_ZEP</a> •
        <a href="/publications_en/">Publications</a> •
        <a href="/teaching_en/">Teaching</a> •
        <a href="/impact/">Impact</a> •
        <a href="/faq/">FAQ</a> •
        <a href="/contact/">Contact</a>
      </p>

      <p>
        🌐 <a href="/home/">FR</a> | <a href="/home/">EN</a>
      </p>

      <p>
        © 2026 Jean Marie Ntsama — All rights reserved.
      </p>

    </footer>

  </body>
</html>
